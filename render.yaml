services:
  - type: web
    name: peterslab-blog-writer
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_PARENT_PAGE_ID
        sync: false
      - key: NOTION_VERSION
        value: 2026-03-11
