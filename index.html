<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peter's Lab Blog Writer</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero-card hero-card-compact">
      <div class="hero-copy compact">
        <p class="hero-kicker">PetersLab</p>
        <h1 data-i18n="productName">Peter's Lab Blog Writer</h1>
        <p class="hero-description" data-i18n="productDescription">
          일본 반려동물 시장 트렌드를 바탕으로 공감형 블로그 초안을 만들고 최종 검토까지 이어지는 단계형 도구입니다.
        </p>
      </div>
      <div class="hero-controls compact">
        <div class="control-card">
          <span class="control-label" data-i18n="language">언어</span>
          <div class="segmented-control">
            <button type="button" class="segment is-active" data-lang-switch="ko">KO</button>
            <button type="button" class="segment" data-lang-switch="en">EN</button>
            <button type="button" class="segment" data-lang-switch="ja">JA</button>
          </div>
        </div>
        <div class="control-card">
          <span class="control-label" data-i18n="connectionStatus">연결 상태</span>
          <div class="status-row">
            <span id="openai-status" class="status-chip neutral">OpenAI</span>
            <span id="notion-status" class="status-chip neutral">Notion</span>
          </div>
        </div>
      </div>
    </header>

    <nav class="step-nav compact">
      <button type="button" class="step-chip is-current" data-phase-nav="trend">
        <span class="step-index">01</span>
        <span class="step-meta">
          <strong data-i18n="stepTrendTitle">Trend Scan</strong>
          <small data-step-state>Current</small>
        </span>
      </button>
      <button type="button" class="step-chip" data-phase-nav="trendLoading">
        <span class="step-index">02</span>
        <span class="step-meta">
          <strong data-i18n="stepTrendLoadingTitle">Trend Loading</strong>
          <small data-step-state>Waiting</small>
        </span>
      </button>
      <button type="button" class="step-chip" data-phase-nav="idea">
        <span class="step-index">03</span>
        <span class="step-meta">
          <strong data-i18n="stepIdeaTitle">Idea Discovery</strong>
          <small data-step-state>Waiting</small>
        </span>
      </button>
      <button type="button" class="step-chip" data-phase-nav="writingLoading">
        <span class="step-index">04</span>
        <span class="step-meta">
          <strong data-i18n="stepWritingLoadingTitle">Blog Writing</strong>
          <small data-step-state>Waiting</small>
        </span>
      </button>
      <button type="button" class="step-chip" data-phase-nav="review">
        <span class="step-index">05</span>
        <span class="step-meta">
          <strong data-i18n="stepReviewTitle">Review &amp; Edit</strong>
          <small data-step-state>Waiting</small>
        </span>
      </button>
      <button type="button" class="step-chip" data-phase-nav="completed">
        <span class="step-index">06</span>
        <span class="step-meta">
          <strong data-i18n="stepCompletedTitle">Completed</strong>
          <small data-step-state>Waiting</small>
        </span>
      </button>
    </nav>

    <div id="status-banner" class="status-banner" data-i18n="heroGuide">
      위에서 아래로 따라가면 트렌드 선택부터 최종 등록 준비까지 순서대로 진행할 수 있습니다.
    </div>

    <main class="page-card">
      <div class="panel-head compact">
        <div>
          <p class="panel-kicker">Step 1</p>
          <h2 data-i18n="stepTrendTitle">Trend Scan</h2>
        </div>
      </div>
      <div class="filter-grid compact">
        <label class="field">
          <span class="field-label">Pet Type</span>
          <select id="filter-pet-type">
            <option value="common" data-i18n-option="petCommon">Common</option>
            <option value="dog" data-i18n-option="petDog">Dog</option>
            <option value="cat" data-i18n-option="petCat">Cat</option>
          </select>
        </label>
        <label class="field">
          <span class="field-label">Theme</span>
          <select id="filter-theme-type">
            <option value="health" data-i18n-option="themeHealth">Health</option>
            <option value="lifestyle" data-i18n-option="themeLifestyle">Lifestyle</option>
            <option value="senior" data-i18n-option="themeSenior">Senior</option>
            <option value="seasonal" data-i18n-option="themeSeasonal">Seasonal</option>
            <option value="anniversary" data-i18n-option="themeAnniversary">Anniversary</option>
            <option value="homecare" data-i18n-option="themeHomecare">Home Care</option>
          </select>
        </label>
        <label class="field">
          <span class="field-label">Search Scope</span>
          <select id="filter-scope">
            <option value="japan" data-i18n-option="scopeJapan">Japan Focus</option>
            <option value="global" data-i18n-option="scopeGlobal">Include Global Signals</option>
          </select>
        </label>
        <button type="button" id="scan-button" class="primary-button">Start Trend Scan</button>
      </div>
    </main>
  </div>

  <script src="./app.js"></script>
  <script src="./trend-page.js"></script>
</body>
</html>
