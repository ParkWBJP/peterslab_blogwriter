<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peter's Lab Blog Writer</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero-card hero-card-compact">
      <div class="hero-copy compact">
        <p class="hero-kicker">PetersLab</p>
        <h1 data-i18n="productName">Peter's Lab Blog Writer</h1>
      </div>
      <div class="hero-controls compact">
        <div class="control-card">
          <span class="control-label" data-i18n="language">언어</span>
          <div class="segmented-control">
            <button type="button" class="segment is-active" data-lang-switch="ko">KO</button>
            <button type="button" class="segment" data-lang-switch="en">EN</button>
            <button type="button" class="segment" data-lang-switch="ja">JA</button>
          </div>
        </div>
      </div>
    </header>

    <nav class="step-nav compact">
      <button type="button" class="step-chip is-complete" data-phase-nav="trend"><span class="step-index">01</span><span class="step-meta"><strong data-i18n="stepTrendTitle">Trend Scan</strong><small data-step-state>Done</small></span></button>
      <button type="button" class="step-chip is-current" data-phase-nav="trendLoading"><span class="step-index">02</span><span class="step-meta"><strong data-i18n="stepTrendLoadingTitle">Trend Loading</strong><small data-step-state>Current</small></span></button>
      <button type="button" class="step-chip" data-phase-nav="idea"><span class="step-index">03</span><span class="step-meta"><strong data-i18n="stepIdeaTitle">Idea Discovery</strong><small data-step-state>Waiting</small></span></button>
      <button type="button" class="step-chip" data-phase-nav="writingLoading"><span class="step-index">04</span><span class="step-meta"><strong data-i18n="stepWritingLoadingTitle">Blog Writing</strong><small data-step-state>Waiting</small></span></button>
      <button type="button" class="step-chip" data-phase-nav="review"><span class="step-index">05</span><span class="step-meta"><strong data-i18n="stepReviewTitle">Review &amp; Edit</strong><small data-step-state>Waiting</small></span></button>
      <button type="button" class="step-chip" data-phase-nav="completed"><span class="step-index">06</span><span class="step-meta"><strong data-i18n="stepCompletedTitle">Completed</strong><small data-step-state>Waiting</small></span></button>
    </nav>

    <div id="status-banner" class="status-banner" data-i18n="heroGuide"></div>

    <main class="page-card">
      <div class="panel-head compact">
        <div>
          <p class="panel-kicker">Step 2</p>
          <h2 data-i18n="stepTrendLoadingTitle">Trend Loading</h2>
        </div>
      </div>
      <div class="loading-stage loading-stage-search">
        <div class="loading-visual search-visual">
          <div class="search-ring ring-one"></div>
          <div class="search-ring ring-two"></div>
          <div class="search-card card-one"></div>
          <div class="search-card card-two"></div>
          <div class="search-card card-three"></div>
        </div>
        <div class="loading-copy">
          <strong id="loading-headline" class="loading-headline"></strong>
          <p id="loading-body" class="loading-subcopy"></p>
          <ul id="loading-list" class="loading-message-list"></ul>
        </div>
      </div>
      <div id="loading-error" class="error-card is-hidden">
        <strong data-i18n="fetchErrorTitle">데이터를 불러오는 중 문제가 발생했습니다</strong>
        <p id="loading-error-text" data-i18n="fetchErrorBody"></p>
        <div class="panel-actions">
          <button type="button" id="retry-button" class="primary-button" data-i18n="retry">다시 시도</button>
          <button type="button" id="back-button" class="secondary-button" data-i18n="backToTrend">트렌드 단계로 돌아가기</button>
        </div>
      </div>
    </main>
  </div>

  <script src="./app.js"></script>
  <script src="./trend-loading-page.js"></script>
</body>
</html>
