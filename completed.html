<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peter's Lab Blog Writer</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero-card hero-card-compact">
      <div class="hero-copy compact">
        <p class="hero-kicker">PetersLab</p>
        <h1 data-i18n="productName">Peter's Lab Blog Writer</h1>
      </div>
    </header>

    <nav class="step-nav compact">
      <button type="button" class="step-chip is-complete" data-phase-nav="trend"><span class="step-index">01</span><span class="step-meta"><strong data-i18n="stepTrendTitle">Trend Scan</strong><small data-step-state>Done</small></span></button>
      <button type="button" class="step-chip is-complete" data-phase-nav="trendLoading"><span class="step-index">02</span><span class="step-meta"><strong data-i18n="stepTrendLoadingTitle">Trend Loading</strong><small data-step-state>Done</small></span></button>
      <button type="button" class="step-chip is-complete" data-phase-nav="idea"><span class="step-index">03</span><span class="step-meta"><strong data-i18n="stepIdeaTitle">Idea Discovery</strong><small data-step-state>Done</small></span></button>
      <button type="button" class="step-chip is-complete" data-phase-nav="writingLoading"><span class="step-index">04</span><span class="step-meta"><strong data-i18n="stepWritingLoadingTitle">Blog Writing</strong><small data-step-state>Done</small></span></button>
      <button type="button" class="step-chip is-complete" data-phase-nav="review"><span class="step-index">05</span><span class="step-meta"><strong data-i18n="stepReviewTitle">Review &amp; Edit</strong><small data-step-state>Done</small></span></button>
      <button type="button" class="step-chip is-current" data-phase-nav="completed"><span class="step-index">06</span><span class="step-meta"><strong data-i18n="stepCompletedTitle">Completed</strong><small data-step-state>Current</small></span></button>
    </nav>

    <div id="status-banner" class="status-banner" data-i18n="heroGuide"></div>

    <main class="page-card">
      <div class="panel-head compact">
        <div>
          <p class="panel-kicker">Step 6</p>
          <h2 data-i18n="stepCompletedTitle">Completed</h2>
        </div>
      </div>

      <article class="completion-card">
        <div class="completion-header">
          <h3 id="completed-title">-</h3>
          <span id="upload-status-chip" class="surface-chip">Ready</span>
        </div>
        <div class="completion-grid compact">
          <div class="completion-item"><span data-i18n="completedTimeLabel">Completed At</span><strong id="completed-time">-</strong></div>
          <div class="completion-item"><span data-i18n="completedUploadLabel">Upload Status</span><strong id="completed-upload-status">-</strong></div>
          <div class="completion-item"><span data-i18n="completedLanguageLabel">Language</span><strong id="completed-language">-</strong></div>
        </div>
        <p id="completed-summary" class="completion-summary">-</p>
        <div class="completion-actions">
          <button type="button" id="upload-notion-button" class="primary-button" data-i18n="notionUpload">Upload to Notion</button>
          <button type="button" id="copy-final-button" class="secondary-button" data-i18n="copyAll">Copy</button>
          <button type="button" id="back-to-review-button" class="secondary-button" data-i18n="backToReview">Back</button>
          <button type="button" id="new-article-button" class="secondary-button" data-i18n="newArticle">New</button>
        </div>
        <a id="notion-link" class="text-link is-hidden" href="#" target="_blank" rel="noreferrer noopener">Open in Notion</a>
      </article>
    </main>
  </div>

  <script src="./app.js"></script>
  <script src="./completed-page.js"></script>
</body>
</html>
